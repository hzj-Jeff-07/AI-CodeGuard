name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to create (e.g. v0.2.0)'
        required: true
        default: 'v0.2.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract changelog section
        env:
          TAG: ${{ inputs.tag }}
        run: |
          VERSION="${TAG#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { flag = 1; next }
            /^## \[/ { flag = 0 }
            flag { print }
          ' CHANGELOG.md > notes.md
          if [ ! -s notes.md ]; then
            echo "See CHANGELOG.md for details." > notes.md
          fi

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file notes.md \
            --target "$GITHUB_SHA"
